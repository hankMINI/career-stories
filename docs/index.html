<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ACE 職涯精靈・原型</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        min-height: 100dvh;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 28px; padding: 32px 24px;
        font-family: "PingFang TC", "Noto Sans TC", system-ui, -apple-system, sans-serif;
        color: #1f1b16;
        background:
          radial-gradient(circle at 16% 18%, rgba(255, 120, 0, 0.16), transparent 30%),
          radial-gradient(circle at 84% 80%, rgba(48, 160, 117, 0.12), transparent 32%),
          #efeae1;
      }
      .head { text-align: center; }
      .head h1 { margin: 0 0 6px; font-size: 22px; font-weight: 800; letter-spacing: 0.02em; }
      .head p { margin: 0; font-size: 14px; color: #7a7269; }
      .links { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; }
      a.card {
        position: relative;
        display: flex; flex-direction: column; gap: 4px;
        padding: 18px 44px 18px 20px; border-radius: 16px;
        background: #fff; text-decoration: none; color: inherit;
        box-shadow: 0 8px 24px rgba(47, 34, 20, 0.12);
        border: 1px solid rgba(0, 0, 0, 0.05);
        transition: transform 0.15s ease;
      }
      a.card:active { transform: scale(0.98); }
      a.card .t { font-size: 18px; font-weight: 800; }
      a.card .d { font-size: 13px; color: #7a7269; }
      a.card .arrow { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #ff7800; }
      .note { font-size: 12px; color: #9a938b; text-align: center; max-width: 360px; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="head">
      <h1>ACE 職涯精靈・流程原型</h1>
      <p>請選擇要查看的版本</p>
    </div>
    <nav class="links">
      <a class="card" href="./first-login.html">
        <span class="t">首次登入</span>
        <span class="d">第一次進入「關於我」的引導流程</span>
        <span class="arrow">→</span>
      </a>
      <a class="card" href="./second-login.html">
        <span class="t">第二次登入</span>
        <span class="d">回訪時的流程</span>
        <span class="arrow">→</span>
      </a>
    </nav>
    <p class="note">進入後需輸入密碼才能瀏覽。建議用 iPhone 開啟，或「加入主畫面」當作 App 全螢幕檢視。</p>
  </body>
</html>
